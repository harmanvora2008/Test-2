<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadratic Programming Solver</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: #fff; color: #111; padding: 1.5rem; max-width: 1100px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 500; margin-bottom: 1.5rem; }
  .grid { display: grid; grid-template-columns: minmax(0,1fr) minmax(0,1.4fr); gap: 1.5rem; }
  .section { margin-bottom: 1.5rem; }
  .label { font-size: 13px; color: #666; margin-bottom: 6px; display: block; }
  .formula-box { background: #f5f5f3; border-radius: 8px; padding: 0.75rem 1rem; font-size: 14px; color: #666; margin-bottom: 8px; }
  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .row span { font-size: 14px; }
  input[type="number"] { width: 64px; text-align: center; padding: 6px 8px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #111; font-size: 14px; }
  input[type="number"]:focus { outline: none; box-shadow: 0 0 0 2px #378ADD; }
  select { padding: 6px 8px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #111; font-size: 14px; cursor: pointer; }
  button { padding: 6px 14px; border-radius: 8px; border: 0.5px solid #ccc; background: #fff; color: #111; font-size: 13px; cursor: pointer; }
  button:hover { background: #f5f5f3; }
  #solve-btn { width: 100%; padding: 0.65rem; font-size: 14px; font-weight: 500; }
  .constraint-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .constraint-row input { width: 56px; }
  .btn-remove { background: none; border: none; cursor: pointer; color: #888; font-size: 18px; padding: 0 4px; line-height: 1; }
  .btn-remove:hover { color: #E24B4A; }
  .result-card { background: #f5f5f3; border-radius: 8px; padding: 1rem; margin-top: 1rem; }
  .result-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-top: 10px; }
  .result-item label { font-size: 12px; color: #666; }
  .result-item .val { font-size: 22px; font-weight: 500; }
  .badge { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 8px; }
  .badge-success { background: #EAF3DE; color: #3B6D11; }
  .badge-danger { background: #FCEBEB; color: #A32D2D; }
  .chart-wrapper { position: relative; width: 100%; height: 380px; }
  .legend { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 8px; font-size: 12px; color: #666; }
  .legend span { display: flex; align-items: center; gap: 4px; }
  .no-constraints { font-size: 13px; color: #aaa; padding: 8px 0; }
  @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>

<h1>Quadratic Programming Solver</h1>

<div class="grid">
<div>

  <div class="section">
    <span class="label">Objective function: f(x, y)</span>
    <div class="formula-box">f(x,y) = ax² + by² + cxy + dx + ey + f</div>
    <div class="row">
      <input type="number" id="ca" value="1" step="0.5">
      <span>x²  +</span>
      <input type="number" id="cb" value="1" step="0.5">
      <span>y²  +</span>
      <input type="number" id="cc" value="0" step="0.5">
      <span>xy</span>
    </div>
    <div class="row">
      <span style="width:16px"></span>
      <input type="number" id="cd" value="0" step="0.5">
      <span>x  +</span>
      <input type="number" id="ce" value="0" step="0.5">
      <span>y  +</span>
      <input type="number" id="cf" value="0" step="0.5">
    </div>
    <div class="row" style="margin-top:8px;">
      <span class="label" style="margin:0;">Optimize:</span>
      <select id="optType">
        <option value="min">Minimize</option>
        <option value="max">Maximize</option>
      </select>
    </div>
  </div>

  <div class="section">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
      <span class="label" style="margin:0;">Constraints (linear)</span>
      <button onclick="addConstraint()">+ Add constraint</button>
    </div>
    <div style="font-size:12px; color:#aaa; margin-bottom:8px;">ax + by ≤ / ≥ / = c</div>
    <div id="constraints-list"></div>
  </div>

  <div class="section">
    <span class="label">Variable bounds</span>
    <div class="row">
      <span style="font-size:14px; width:14px;">x</span>
      <input type="number" id="xmin" value="-5" step="1" style="width:56px;">
      <span style="font-size:13px;color:#888;">to</span>
      <input type="number" id="xmax" value="5" step="1" style="width:56px;">
    </div>
    <div class="row">
      <span style="font-size:14px; width:14px;">y</span>
      <input type="number" id="ymin" value="-5" step="1" style="width:56px;">
      <span style="font-size:13px;color:#888;">to</span>
      <input type="number" id="ymax" value="5" step="1" style="width:56px;">
    </div>
  </div>

  <button id="solve-btn" onclick="solve()">Solve</button>

  <div id="results"></div>

</div>

<div>
  <span class="label">2D contour graph</span>
  <div class="chart-wrapper">
    <canvas id="qpChart" role="img" aria-label="2D contour plot of objective function with constraints and optimal point"></canvas>
  </div>
  <div class="legend" id="legend"></div>
</div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
let constraints = [];
let chartInst = null;

function addConstraint(a=1, b=1, op='<=', c=4) {
  const id = Date.now();
  constraints.push({ id, a, b, op, c });
  renderConstraints();
}

function removeConstraint(id) {
  constraints = constraints.filter(c => c.id !== id);
  renderConstraints();
}

function renderConstraints() {
  const el = document.getElementById('constraints-list');
  if (constraints.length === 0) {
    el.innerHTML = '<div class="no-constraints">No constraints added</div>';
    return;
  }
  el.innerHTML = constraints.map(c => `
    <div class="constraint-row">
      <input type="number" value="${c.a}" step="0.5" style="width:56px;" onchange="updateC(${c.id},'a',this.value)">
      <span>x</span>
      <input type="number" value="${c.b}" step="0.5" style="width:56px;" onchange="updateC(${c.id},'b',this.value)">
      <span>y</span>
      <select onchange="updateC(${c.id},'op',this.value)">
        ${['<=','>=','='].map(o=>`<option ${c.op===o?'selected':''}>${o}</option>`).join('')}
      </select>
      <input type="number" value="${c.c}" step="0.5" style="width:56px;" onchange="updateC(${c.id},'c',this.value)">
      <button class="btn-remove" onclick="removeConstraint(${c.id})">×</button>
    </div>
  `).join('');
}

function updateC(id, key, val) {
  const c = constraints.find(x => x.id === id);
  if (c) c[key] = key === 'op' ? val : parseFloat(val) || 0;
}

function getParams() {
  return {
    a: parseFloat(document.getElementById('ca').value) || 0,
    b: parseFloat(document.getElementById('cb').value) || 0,
    c: parseFloat(document.getElementById('cc').value) || 0,
    d: parseFloat(document.getElementById('cd').value) || 0,
    e: parseFloat(document.getElementById('ce').value) || 0,
    f: parseFloat(document.getElementById('cf').value) || 0,
    xmin: parseFloat(document.getElementById('xmin').value) || -5,
    xmax: parseFloat(document.getElementById('xmax').value) || 5,
    ymin: parseFloat(document.getElementById('ymin').value) || -5,
    ymax: parseFloat(document.getElementById('ymax').value) || 5,
    opt: document.getElementById('optType').value
  };
}

function objFn(x, y, p) {
  return p.a*x*x + p.b*y*y + p.c*x*y + p.d*x + p.e*y + p.f;
}

function checkConstraints(x, y) {
  for (const con of constraints) {
    const lhs = con.a * x + con.b * y;
    if (con.op === '<=' && lhs > con.c + 1e-9) return false;
    if (con.op === '>=' && lhs < con.c - 1e-9) return false;
    if (con.op === '=' && Math.abs(lhs - con.c) > 0.1) return false;
  }
  return true;
}

function solve() {
  const p = getParams();
  const steps = 120;
  const dx = (p.xmax - p.xmin) / steps;
  const dy = (p.ymax - p.ymin) / steps;
  let bestVal = p.opt === 'min' ? Infinity : -Infinity;
  let bestX = null, bestY = null;

  for (let i = 0; i <= steps; i++) {
    for (let j = 0; j <= steps; j++) {
      const x = p.xmin + i * dx;
      const y = p.ymin + j * dy;
      if (!checkConstraints(x, y)) continue;
      const v = objFn(x, y, p);
      if (p.opt === 'min' ? v < bestVal : v > bestVal) {
        bestVal = v; bestX = x; bestY = y;
      }
    }
  }

  const resultsEl = document.getElementById('results');
  if (bestX === null) {
    resultsEl.innerHTML = `<div class="result-card"><span class="badge badge-danger">Infeasible</span><p style="font-size:13px;color:#888;margin-top:8px;">No feasible point found in bounds. Try adjusting constraints or bounds.</p></div>`;
    return;
  }

  resultsEl.innerHTML = `
    <div class="result-card">
      <span class="badge badge-success">Optimal found</span>
      <div class="result-grid">
        <div class="result-item"><label>x*</label><div class="val">${bestX.toFixed(3)}</div></div>
        <div class="result-item"><label>y*</label><div class="val">${bestY.toFixed(3)}</div></div>
        <div class="result-item"><label>f(x*,y*)</label><div class="val">${bestVal.toFixed(3)}</div></div>
      </div>
    </div>
  `;
  drawChart(p, bestX, bestY);
}

function drawChart(p, optX, optY) {
  const N = 40;
  const xs = [], ys = [];
  for (let i = 0; i <= N; i++) {
    xs.push(p.xmin + (p.xmax - p.xmin) * i / N);
    ys.push(p.ymin + (p.ymax - p.ymin) * i / N);
  }

  let mn = Infinity, mx = -Infinity;
  for (let j = 0; j <= N; j++) {
    for (let i = 0; i <= N; i++) {
      const v = objFn(xs[i], ys[j], p);
      if (v < mn) mn = v;
      if (v > mx) mx = v;
    }
  }

  const nLevels = 8;
  const levels = Array.from({length: nLevels}, (_, k) => mn + (mx - mn) * k / (nLevels - 1));
  const colors = ['#185FA5','#378ADD','#85B7EB','#B5D4F4','#9FE1CB','#5DCAA5','#1D9E75','#0F6E56'];
  const datasets = [];

  levels.forEach((lv, li) => {
    const pts = [];
    for (let j = 0; j < N; j++) {
      for (let i = 0; i < N; i++) {
        const v00 = objFn(xs[i], ys[j], p);
        const v10 = objFn(xs[i+1], ys[j], p);
        const v01 = objFn(xs[i], ys[j+1], p);
        const v11 = objFn(xs[i+1], ys[j+1], p);
        const above = [v00,v10,v11,v01].map(v => v >= lv);
        if (above.every(Boolean) || above.every(b => !b)) continue;
        const edgePts = [];
        [[v00,v10,xs[i],ys[j],xs[i+1],ys[j]],
         [v10,v11,xs[i+1],ys[j],xs[i+1],ys[j+1]],
         [v11,v01,xs[i+1],ys[j+1],xs[i],ys[j+1]],
         [v01,v00,xs[i],ys[j+1],xs[i],ys[j]]].forEach(([va,vb,x1,y1,x2,y2]) => {
          if ((va >= lv) !== (vb >= lv)) {
            const t = (lv - va) / (vb - va);
            edgePts.push({ x: x1 + t*(x2-x1), y: y1 + t*(y2-y1) });
          }
        });
        if (edgePts.length >= 2) pts.push(edgePts[0], edgePts[1], {x:null,y:null});
      }
    }
    datasets.push({ label: `f=${lv.toFixed(1)}`, data: pts, borderColor: colors[li], backgroundColor: 'transparent', pointRadius: 0, borderWidth: 1.5, spanGaps: false, showLine: true });
  });

  const conColors = ['#D85A30','#993556','#534AB7','#0F6E56'];
  constraints.forEach((con, ci) => {
    const linePts = [];
    if (Math.abs(con.b) > 1e-9) {
      linePts.push({ x: p.xmin, y: (con.c - con.a * p.xmin) / con.b });
      linePts.push({ x: p.xmax, y: (con.c - con.a * p.xmax) / con.b });
    } else if (Math.abs(con.a) > 1e-9) {
      const cx = con.c / con.a;
      linePts.push({ x: cx, y: p.ymin });
      linePts.push({ x: cx, y: p.ymax });
    }
    datasets.push({ label: `${con.a}x+${con.b}y${con.op}${con.c}`, data: linePts, borderColor: conColors[ci % 4], backgroundColor: 'transparent', borderWidth: 2, borderDash: [5,3], pointRadius: 0, showLine: true });
  });

  datasets.push({ label: 'Optimal', data: [{ x: optX, y: optY }], borderColor: '#D85A30', backgroundColor: '#D85A30', pointRadius: 8, pointStyle: 'star', showLine: false });

  if (p.ymin <= 0 && p.ymax >= 0) {
    datasets.push({ label: 'x-axis', data: [{ x: p.xmin, y: 0 }, { x: p.xmax, y: 0 }], borderColor: '#333', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, showLine: true, spanGaps: true });
  }
  if (p.xmin <= 0 && p.xmax >= 0) {
    datasets.push({ label: 'y-axis', data: [{ x: 0, y: p.ymin }, { x: 0, y: p.ymax }], borderColor: '#333', backgroundColor: 'transparent', borderWidth: 2, pointRadius: 0, showLine: true, spanGaps: true });
  }

  if (chartInst) chartInst.destroy();
  const ctx = document.getElementById('qpChart').getContext('2d');
  chartInst = new Chart(ctx, {
    type: 'scatter',
    data: { datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `(${ctx.parsed.x?.toFixed(2)}, ${ctx.parsed.y?.toFixed(2)})` } } },
      scales: {
        x: { min: p.xmin, max: p.xmax, grid: { color: 'rgba(128,128,128,0.12)' }, ticks: { color: '#888', font: { size: 11 }, callback: v => v.toFixed(1) }, border: { color: '#555', width: 2 } },
        y: { min: p.ymin, max: p.ymax, grid: { color: 'rgba(128,128,128,0.12)' }, ticks: { color: '#888', font: { size: 11 }, callback: v => v.toFixed(1) }, border: { color: '#555', width: 2 } }
      }
    }
  });

  const leg = document.getElementById('legend');
  leg.innerHTML = `
    <span><span style="width:16px;height:3px;background:linear-gradient(90deg,#185FA5,#0F6E56);display:inline-block;border-radius:2px;"></span> Contour levels</span>
    ${constraints.map((c,i) => `<span><span style="width:16px;height:3px;background:${conColors[i%4]};display:inline-block;border-radius:2px;border-top:2px dashed ${conColors[i%4]};"></span> ${c.a}x+${c.b}y${c.op}${c.c}</span>`).join('')}
    <span><span style="width:10px;height:10px;background:#D85A30;border-radius:50%;display:inline-block;"></span> Optimal point</span>
  `;
}

addConstraint(1, 1, '<=', 4);
addConstraint(1, 0, '>=', -3);
renderConstraints();
solve();
</script>
</body>
</html>
